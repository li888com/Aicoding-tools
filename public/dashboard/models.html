<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>按模型统计 - AI Coding 统计</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="models">
    <header class="topbar">
      <div>
        <p class="eyebrow">AI Coding Stats</p>
        <h1>按模型统计</h1>
      </div>
      <button id="logoutButton" class="secondary-button" type="button">退出</button>
    </header>
    <nav class="page-nav" aria-label="统计页面">
      <a href="/" data-nav="overview">总览</a>
      <a href="/requirements.html" data-nav="requirements">按需求</a>
      <a href="/models.html" data-nav="models">按模型</a>
      <a href="/timeline.html" data-nav="timeline">按日期</a>
      <a href="/rounds.html" data-nav="rounds">对话详情</a>
      <a href="/requirement-maintenance.html" data-nav="requirement-maintenance">需求维护</a>
      <a href="/local-logs.html" data-nav="local-logs">本地日志</a>
    </nav>
    <main class="workspace">
      <section id="filters" class="filters" aria-label="筛选条件"></section>
      <article class="panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Models</p>
            <h2>模型明细</h2>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>模型</th>
                <th>有效轮次</th>
                <th>代码改动</th>
                <th>Token</th>
                <th>撤销率</th>
                <th>平均耗时</th>
                <th>行/千Token</th>
              </tr>
            </thead>
            <tbody id="modelsTable"></tbody>
          </table>
        </div>
      </article>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
