services:
  dashboard:
    build: .
    container_name: mcp-toolbox-dashboard
    restart: unless-stopped
    environment:
      MCP_TOOLBOX_STORAGE_DIR: /data
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: "3000"
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-change-me}
      DASHBOARD_SESSION_SECRET: ${DASHBOARD_SESSION_SECRET:-replace-with-a-long-random-secret}
    volumes:
      - dashboard-data:/data
    ports:
      - "3000:3000"

volumes:
  dashboard-data:
